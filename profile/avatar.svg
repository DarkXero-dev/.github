<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <clipPath id="clip">
      <circle cx="100" cy="100" r="94"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Animated glowing border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#6e40c9" stroke-width="3" filter="url(#softglow)">
    <animate attributeName="stroke" values="#6e40c9;#a78bfa;#6e40c9" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Background -->
  <circle cx="100" cy="100" r="94" fill="#0d1117"/>

  <g clip-path="url(#clip)">

    <!-- Terminal title bar -->
    <rect x="6" y="6" width="188" height="24" fill="#161b22"/>
    <circle cx="22" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="5" fill="#febc2e"/>
    <circle cx="54" cy="18" r="5" fill="#28c840"/>
    <text x="80" y="22" font-family="monospace" font-size="9" fill="#555">darkxero@arch</text>

    <!-- Prompt 1: uname -->
    <text x="12" y="50" font-family="monospace" font-size="10" fill="#6e40c9" filter="url(#glow)">~</text>
    <text x="22" y="50" font-family="monospace" font-size="10" fill="#ffffff"> $ </text>
    <text x="40" y="50" font-family="monospace" font-size="10" fill="#7dd3fc">uname -r</text>

    <!-- Output 1 -->
    <text x="12" y="64" font-family="monospace" font-size="9" fill="#86efac" opacity="0">
      6.x.x-cachyos-bore
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.6s" fill="freeze"/>
    </text>

    <!-- Prompt 2: neofetch -->
    <text x="12" y="82" font-family="monospace" font-size="10" fill="#6e40c9" filter="url(#glow)" opacity="0">
      ~
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.0s" fill="freeze"/>
    </text>
    <text x="22" y="82" font-family="monospace" font-size="10" fill="#ffffff" opacity="0">
       $
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.0s" fill="freeze"/>
    </text>
    <text x="40" y="82" font-family="monospace" font-size="10" fill="#7dd3fc" opacity="0">
      neofetch
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.0s" fill="freeze"/>
    </text>

    <!-- Output 2 -->
    <text x="12" y="96" font-family="monospace" font-size="9" fill="#f472b6" opacity="0">
      OS: XeroLinux (Arch)
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/>
    </text>
    <text x="12" y="109" font-family="monospace" font-size="9" fill="#f472b6" opacity="0">
      DE: KDE Plasma
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="12" y="122" font-family="monospace" font-size="9" fill="#f472b6" opacity="0">
      Shell: zsh
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.1s" fill="freeze"/>
    </text>

    <!-- Prompt 3: final line with blinking cursor -->
    <text x="12" y="145" font-family="monospace" font-size="10" fill="#6e40c9" filter="url(#glow)" opacity="0">
      ~
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.5s" fill="freeze"/>
    </text>
    <text x="22" y="145" font-family="monospace" font-size="10" fill="#ffffff" opacity="0">
       $
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.5s" fill="freeze"/>
    </text>

    <!-- Blinking cursor -->
    <rect x="40" y="133" width="9" height="14" fill="#6e40c9" filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.5s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom color blocks (neofetch style) -->
    <g opacity="0">
      <rect x="12"  y="165" width="16" height="10" rx="2" fill="#1e1e2e"/>
      <rect x="32"  y="165" width="16" height="10" rx="2" fill="#ff5f57"/>
      <rect x="52"  y="165" width="16" height="10" rx="2" fill="#febc2e"/>
      <rect x="72"  y="165" width="16" height="10" rx="2" fill="#28c840"/>
      <rect x="92"  y="165" width="16" height="10" rx="2" fill="#7dd3fc"/>
      <rect x="112" y="165" width="16" height="10" rx="2" fill="#6e40c9"/>
      <rect x="132" y="165" width="16" height="10" rx="2" fill="#f472b6"/>
      <rect x="152" y="165" width="16" height="10" rx="2" fill="#ffffff"/>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.8s" fill="freeze"/>
    </g>

  </g>
</svg>
